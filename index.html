<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hollow: Devorar ou Ser Devorado</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #ccc;
      font-family: 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    #game {
      max-width: 600px;
      width: 100%;
      background: #1a1a1a;
      border: 2px solid #444;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 0 20px #00000088;
    }
    h2, h3 { color: #cc3333; }
    button {
      background: #2a2a2a;
      color: #ddd;
      border: 1px solid #555;
      padding: 8px 14px;
      margin: 4px;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #3a3a3a; border-color: #cc3333; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .bar-container {
      background: #222;
      border-radius: 4px;
      height: 18px;
      width: 100%;
      margin: 4px 0;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 100%;
      transition: width 0.3s;
    }
    .bar-fill.green { background: #33aa33; }
    .bar-fill.blue { background: #3377cc; }
    .bar-fill.orange { background: #ff8800; }
    .log {
      background: #111;
      border: 1px solid #333;
      padding: 10px;
      margin: 12px 0;
      max-height: 220px;
      overflow-y: auto;
      font-size: 0.9em;
      color: #aaa;
    }
    .log p { margin: 3px 0; }
    .highlight { color: #ff8800; font-weight: bold; }
    .evolucao { color: #ffcc00; font-weight: bold; font-size: 1.1em; }
    .shinigami { color: #ff4444; font-weight: bold; }
    .ally { color: #88aaff; }
    #start-screen, #game-screen, #combat-screen { display: none; }
    #game-screen.active, #start-screen.active, #combat-screen.active { display: block; }
    #player-stats, #enemy-stats { margin: 10px 0; }
    #hunger-bar { margin-top: 5px; }
    .status-text { font-size: 0.85em; margin: 2px 0; }
  </style>
</head>
<body>
<div id="game">
  <div id="start-screen" class="active">
    <h2>🌑 Hueco Mundo</h2>
    <p>Você é um Hollow faminto. A areia branca se estende sob a lua eterna. Caçe, explore e devore para sobreviver.</p>
    <input type="text" id="name-input" placeholder="Nome do Hollow" maxlength="12">
    <button id="start-btn">Iniciar Caçada</button>
  </div>

  <div id="game-screen">
    <div id="player-stats"></div>
    <button id="hunt-btn">🔪 Caçar Hollow</button>
    <button id="explore-btn">🔍 Explorar (incerto)</button>
    <div class="log" id="log"></div>
  </div>

  <div id="combat-screen">
    <h3>⚔️ Combate</h3>
    <div id="enemy-stats"></div>
    <hr>
    <div id="player-stats-combat"></div>
    <div id="combat-actions"></div>
    <div id="ally-action" style="display:none; margin-top:8px;">
      <button id="ally-attack-btn">🤝 Aliado ataca</button>
    </div>
    <div class="log" id="combat-log"></div>
  </div>
</div>

<script>
  (function() {
    // -------------------- Tipos de Hollow (nomes temáticos) --------------------
    const HOLLOW_TYPES = {
      "Hollow Comum": ["Prices", "Claws", "Muscles", "Beast"],
      "Menos Grande": ["Jaw", "Scratch", "Nerves", "Hungry"],
      "Adjucha": ["Language", "Fingers", "Gluttony", "Eyes closed"],
      "Vasto Lorde": ["Vision kingdoms", "Warlord", "Vomit", "Tyranny"]
    };

    // -------------------- Habilidades e danos fixos --------------------
    const FORM_ABILITIES = {
      "Hollow Comum": {
        hp: 50,
        abilities: [
          { name: "Mordida", value: 10 },
          { name: "Arranhar", value: 10 }
        ]
      },
      "Menos Grande": {
        hp: 100,
        abilities: [
          { name: "Mordida", value: 20 },
          { name: "Arranhar", value: 20 },
          { name: "CERO", value: 40 }
        ]
      },
      "Adjucha": {
        hp: 300,
        abilities: [
          { name: "Mordida", value: 50 },
          { name: "Arranhar", value: 50 },
          { name: "CERO", value: 100 },
          { name: "Regeneração", value: 50 }
        ]
      },
      "Vasto Lorde": {
        hp: 750,
        abilities: [
          { name: "Cortes", value: 150 },
          { name: "CERO", value: 300 },
          { name: "Balas", value: 70, multi: true },
          { name: "Grand-Cero", value: 500 },
          { name: "Regeneração", value: 50 }
        ]
      }
    };

    // Shinigami especial
    const SHINIGAMI = {
      name: "Shinigami",
      form: "Shinigami",
      hp: 200,
      abilities: [
        { name: "Zanpakutō", value: 35 },
        { name: "Hadō #31", value: 50 },
        { name: "Bakudō #61", value: 20, stun: true }
      ]
    };

    // -------------------- Classe Hollow --------------------
    class Hollow {
      constructor(name, form = "Hollow Comum", xp = 0, isEnemy = false, typeName = null) {
        this.name = name;
        this.form = form;
        this.xp = xp;
        this.isEnemy = isEnemy;
        this.typeName = typeName;
        const data = this.form === "Shinigami" ? SHINIGAMI : FORM_ABILITIES[form];
        this.maxHp = data.hp;
        this.hp = this.maxHp;
        this.abilities = data.abilities.map(a => ({...a}));
        this.xpNeeded = this.getXpNeeded();
        this.stunned = false;
      }

      getXpNeeded() {
        if (this.form === "Hollow Comum") return 20;
        if (this.form === "Menos Grande") return 60;
        if (this.form === "Adjucha") return 150;
        return Infinity;
      }

      isAlive() { return this.hp > 0; }

      useAbility(abilityName, target) {
        if (this.stunned) {
          this.stunned = false;
          return { dmg: 0, msg: `${this.name} está atordoado e não pode agir!` };
        }
        const ab = this.abilities.find(a => a.name === abilityName);
        if (!ab) return { dmg: 0, msg: "Habilidade inválida." };
        let dmg = 0;
        let msg = "";
        if (ab.name === "Regeneração") {
          const heal = ab.value;
          this.hp = Math.min(this.maxHp, this.hp + heal);
          return { dmg: 0, msg: `${this.name} usou Regeneração e recuperou ${heal} HP.` };
        } else if (ab.multi) {
          const hits = Math.floor(Math.random() * 4) + 2;
          dmg = ab.value * hits;
          msg = `${this.name} usou ${ab.name} (${hits} golpes) e causou ${dmg} de dano.`;
        } else {
          dmg = ab.value;
          msg = `${this.name} usou ${ab.name} e causou ${dmg} de dano.`;
        }
        target.hp -= dmg;
        // Efeito adicional de stun (Bakudō)
        if (ab.stun) {
          target.stunned = true;
          msg += ` ${target.name} está atordoado!`;
        }
        return { dmg, msg };
      }

      eat(prey) {
        const gain = prey.xp + Math.floor(Math.random() * 15) + 5;
        this.xp += gain;
        const msg = `Você devorou ${prey.name} e ganhou ${gain} de XP. (Total: ${this.xp}/${this.xpNeeded})`;
        player.reduceHunger(60);
        this.checkEvolution();
        return msg;
      }

      checkEvolution() {
        if (this.form === "Hollow Comum" && this.xp >= 20) {
          this.evolve("Menos Grande");
        } else if (this.form === "Menos Grande" && this.xp >= 60) {
          this.evolve("Adjucha");
        } else if (this.form === "Adjucha" && this.xp >= 150) {
          this.evolve("Vasto Lorde");
        }
      }

      evolve(newForm) {
        this.form = newForm;
        const data = FORM_ABILITIES[newForm];
        this.maxHp = data.hp;
        this.hp = this.maxHp;
        this.abilities = data.abilities.map(a => ({...a}));
        this.xpNeeded = this.getXpNeeded();
        addLog(`🌟 EVOLUÇÃO! Agora você é um ${newForm}!`, 'evolucao');
      }
    }

    // -------------------- Geração de inimigos --------------------
    function generateEnemy(playerLevel) {
      let form;
      if (playerLevel === 0) form = Math.random() < 0.85 ? "Hollow Comum" : "Menos Grande";
      else if (playerLevel === 1) form = Math.random() < 0.6 ? "Menos Grande" : "Adjucha";
      else if (playerLevel === 2) form = Math.random() < 0.7 ? "Adjucha" : "Vasto Lorde";
      else form = "Vasto Lorde";
      const typeNames = HOLLOW_TYPES[form];
      const typeName = typeNames[Math.floor(Math.random() * typeNames.length)];
      const xp = Math.floor(Math.random() * 25) + 5;
      return new Hollow(typeName, form, xp, true, typeName);
    }

    // -------------------- Variáveis do jogador --------------------
    let player = null;
    let hunger = 0; // 0-100
    let hasAlly = false; // aliado temporário
    let currentEnemy = null;

    const startScreen = document.getElementById('start-screen');
    const gameScreen = document.getElementById('game-screen');
    const combatScreen = document.getElementById('combat-screen');
    const logDiv = document.getElementById('log');
    const combatLogDiv = document.getElementById('combat-log');

    function addLog(msg, cls = '') {
      const p = document.createElement('p');
      if (cls) p.className = cls;
      p.textContent = msg;
      logDiv.appendChild(p);
      combatLogDiv.appendChild(p.cloneNode(true));
      logDiv.scrollTop = logDiv.scrollHeight;
      combatLogDiv.scrollTop = combatLogDiv.scrollHeight;
    }

    function clearLogs() {
      logDiv.innerHTML = '';
      combatLogDiv.innerHTML = '';
    }

    function showScreen(screen) {
      startScreen.classList.remove('active');
      gameScreen.classList.remove('active');
      combatScreen.classList.remove('active');
      screen.classList.add('active');
    }

    function updateHungerBar() {
      const container = document.getElementById('player-stats');
      const bar = document.getElementById('hunger-bar');
      if (!bar) {
        container.innerHTML += `<div id="hunger-bar" class="status-text">Fome: ${hunger}/100 
          <div class="bar-container"><div class="bar-fill orange" style="width:${hunger}%"></div></div></div>`;
      } else {
        bar.innerHTML = `Fome: ${hunger}/100 
          <div class="bar-container"><div class="bar-fill orange" style="width:${hunger}%"></div></div>`;
      }
    }

    function increaseHunger(amount) {
      hunger = Math.min(100, hunger + amount);
      if (hunger >= 100) {
        const dmg = Math.floor(player.hp * 0.15);
        player.hp -= dmg;
        addLog(`⚠️ Sua fome é insuportável! Você perde ${dmg} HP.`);
        hunger = 0;
        if (!player.isAlive()) {
          addLog("Você desmaiou de fome e foi devorado por outros Hollows...");
          gameOver();
        }
      }
      updateHungerBar();
    }

    window.reduceHunger = function(amount) {
      hunger = Math.max(0, hunger - amount);
      updateHungerBar();
    };

    function updatePlayerStats(containerId = 'player-stats') {
      const container = document.getElementById(containerId);
      container.innerHTML = `
        <strong>${player.name}</strong> [${player.form}]<br>
        HP: ${player.hp}/${player.maxHp} 
        <div class="bar-container"><div class="bar-fill green" style="width:${(player.hp/player.maxHp)*100}%"></div></div>
        XP: ${player.xp}/${player.xpNeeded}<br>
        Habilidades: ${player.abilities.map(a => a.name).join(', ')}
        ${hasAlly ? '<span class="ally"> (Aliado presente)</span>' : ''}
      `;
      updateHungerBar();
    }

    function updateEnemyStats() {
      const container = document.getElementById('enemy-stats');
      container.innerHTML = `
        <strong>${currentEnemy.name}</strong> [${currentEnemy.form}]<br>
        HP: ${currentEnemy.hp}/${currentEnemy.maxHp}
        <div class="bar-container"><div class="bar-fill" style="width:${(currentEnemy.hp/currentEnemy.maxHp)*100}%"></div></div>
        ${currentEnemy.stunned ? '<span style="color:yellow;">(Atordoado)</span>' : ''}
      `;
    }

    function setupCombatActions() {
      const actionsDiv = document.getElementById('combat-actions');
      actionsDiv.innerHTML = '';
      player.abilities.forEach(ab => {
        const btn = document.createElement('button');
        btn.textContent = ab.name;
        btn.addEventListener('click', () => playerTurn(ab.name));
        actionsDiv.appendChild(btn);
      });
      // Botão de aliado
      const allyDiv = document.getElementById('ally-action');
      const allyBtn = document.getElementById('ally-attack-btn');
      if (hasAlly && currentEnemy && currentEnemy.isAlive()) {
        allyDiv.style.display = 'block';
        allyBtn.onclick = allyAttack;
      } else {
        allyDiv.style.display = 'none';
      }
    }

    function allyAttack() {
      if (!hasAlly || !currentEnemy || !currentEnemy.isAlive()) return;
      const dmg = 20;
      currentEnemy.hp -= dmg;
      addLog(`🤝 Seu aliado ataca, causando ${dmg} de dano.`, 'ally');
      updateEnemyStats();
      // 50% de chance do aliado ir embora
      if (Math.random() < 0.5) {
        hasAlly = false;
        addLog("O aliado Hollow fugiu após o ataque.", 'ally');
        document.getElementById('ally-action').style.display = 'none';
      }
      if (!currentEnemy.isAlive()) {
        addLog(`${currentEnemy.name} foi derrotado!`);
        endCombat(true);
      }
    }

    function startCombat(enemy) {
      currentEnemy = enemy;
      showScreen(combatScreen);
      updatePlayerStats('player-stats-combat');
      updateEnemyStats();
      setupCombatActions();
      combatLogDiv.innerHTML = `<p>Você encontrou ${enemy.name} (${enemy.form})!</p>`;
    }

    function endCombat(victory) {
      if (victory) {
        const msg = player.eat(currentEnemy);
        addLog(msg);
        if (player.form === "Vasto Lorde") {
          addLog("🌟 Você se tornou um Vasto Lorde! O ápice da existência Hollow. 🌟");
          alert("Parabéns! Você alcançou o topo da cadeia alimentar! Atualize a página para jogar novamente.");
          disableButtons();
        }
        showScreen(gameScreen);
        updatePlayerStats();
      } else {
        gameOver();
      }
    }

    function playerTurn(abilityName) {
      if (!currentEnemy || !player.isAlive()) return;
      const result = player.useAbility(abilityName, currentEnemy);
      addLog(result.msg, 'highlight');
      updateEnemyStats();
      updatePlayerStats('player-stats-combat');

      if (!currentEnemy.isAlive()) {
        addLog(`${currentEnemy.name} foi derrotado!`);
        endCombat(true);
        return;
      }

      // Turno do inimigo
      const enemyAb = currentEnemy.abilities[Math.floor(Math.random() * currentEnemy.abilities.length)];
      const enemyResult = currentEnemy.useAbility(enemyAb.name, player);
      addLog(enemyResult.msg);
      updatePlayerStats('player-stats-combat');
      updateEnemyStats();

      if (!player.isAlive()) {
        addLog("Você caiu em combate...");
        endCombat(false);
      }
      // Atualiza botão aliado (pode ter morrido)
      setupCombatActions();
    }

    function explore() {
      increaseHunger(25);
      const roll = Math.random();
      if (roll < 0.15) {
        // 15% de chance de carcaça
        const xpGain = Math.floor(Math.random() * 20) + 10;
        const heal = Math.floor(player.maxHp * 0.25);
        player.xp += xpGain;
        player.hp = Math.min(player.maxHp, player.hp + heal);
        reduceHunger(50);
        addLog("🔍 Você encontrou uma carcaça! Devorou os restos, ganhou " + xpGain + " XP e curou " + heal + " HP.");
        player.checkEvolution();
        updatePlayerStats();
      } else if (roll < 0.25) {
        // 10% de chance de evento especial
        if (Math.random() < 0.6) {
          // Hollow aliado
          hasAlly = true;
          addLog("🤝 Você encontrou um Hollow ferido. Ele se junta a você por um tempo.", 'ally');
        } else {
          // Shinigami!
          addLog("⚡ Você sente uma pressão espiritual esmagadora! Um Shinigami aparece!", 'shinigami');
          const shini = new Hollow("Shinigami", "Shinigami", 40, true, null);
          startCombat(shini);
          return; // combate inicia imediatamente
        }
        updatePlayerStats();
      } else {
        addLog("🔍 Você vagou pela areia branca, mas não encontrou nada.");
      }
    }

    function hunt() {
      increaseHunger(30);
      const levelMap = { "Hollow Comum": 0, "Menos Grande": 1, "Adjucha": 2, "Vasto Lorde": 3 };
      const level = levelMap[player.form];
      const enemy = generateEnemy(level);
      startCombat(enemy);
    }

    function gameOver() {
      addLog("☠️ Você foi destruído. Sua jornada termina aqui.");
      alert("Game Over! Atualize a página para tentar novamente.");
      disableButtons();
      showScreen(gameScreen);
    }

    function disableButtons() {
      document.getElementById('hunt-btn').disabled = true;
      document.getElementById('explore-btn').disabled = true;
    }

    // -------------------- Inicialização --------------------
    document.getElementById('start-btn').addEventListener('click', () => {
      const name = document.getElementById('name-input').value.trim();
      if (!name) {
        alert("Escolha um nome para o seu Hollow.");
        return;
      }
      player = new Hollow(name);
      hunger = 0;
      hasAlly = false;
      clearLogs();
      updatePlayerStats();
      document.getElementById('hunt-btn').disabled = false;
      document.getElementById('explore-btn').disabled = false;
      addLog(`Bem-vindo, ${name}. A fome o consome.`);
      showScreen(gameScreen);
    });

    document.getElementById('hunt-btn').addEventListener('click', hunt);
    document.getElementById('explore-btn').addEventListener('click', explore);

    showScreen(startScreen);
  })();
</script>
</body>
</html>
