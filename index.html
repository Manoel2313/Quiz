<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Projeto O₂: Ascensão · Edição Imersiva</title>
  <style>
    :root {
      --bg: #0b0e0c;
      --gold: #e6b34a;
      --gold-glow: #e6b34a66;
      --rust: #b45a3c;
      --rust-glow: #b45a3c66;
      --ember: #d94f3a;
      --ember-glow: #d94f3a66;
      --ocean: #60b5cc;
      --ocean-glow: #60b5cc55;
      --leaf: #6bbf6b;
      --leaf-glow: #6bbf6b66;
      --panel: rgba(18, 22, 18, 0.8);
      --panel-light: rgba(28, 32, 26, 0.75);
      --border: rgba(220, 200, 140, 0.15);
      --border-active: rgba(230, 180, 70, 0.5);
      --text: #e0dac8;
      --text-dim: #a8a290;
      --font-main: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 18px;
      --ease-spring: cubic-bezier(0.4, 1.6, 0.5, 1);
      --ease-smooth: cubic-bezier(0.2, 0.9, 0.3, 1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font-main);
      background: #080b09;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
      background-image: radial-gradient(circle at 20% 30%, rgba(60, 40, 30, 0.25), transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(20, 40, 35, 0.25), transparent 50%);
    }
    #game-container {
      width: 100%;
      max-width: 780px;
      background: rgba(18, 22, 18, 0.7);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 2rem 2rem 1.8rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.7), 0 0 30px rgba(100, 80, 40, 0.15);
      position: relative;
      transition: all 0.4s var(--ease-smooth);
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }
    /* temas por tela */
    .theme-bunker {
      border-color: rgba(230, 180, 70, 0.4);
      box-shadow: 0 25px 50px rgba(0,0,0,0.7), 0 0 40px rgba(230, 180, 70, 0.2);
      background: rgba(24, 22, 14, 0.75);
    }
    .theme-surface {
      border-color: rgba(180, 90, 50, 0.45);
      box-shadow: 0 25px 50px rgba(0,0,0,0.7), 0 0 35px rgba(160, 80, 40, 0.25);
      background: rgba(28, 22, 18, 0.75);
    }
    .theme-combat {
      border-color: rgba(220, 60, 50, 0.7);
      box-shadow: 0 25px 50px rgba(0,0,0,0.8), 0 0 60px rgba(220, 60, 50, 0.45);
      background: rgba(35, 12, 10, 0.85);
      animation: panicPulse 0.7s infinite alternate;
    }
    @keyframes panicPulse {
      from { box-shadow: 0 25px 50px rgba(0,0,0,0.8), 0 0 60px rgba(220, 60, 50, 0.45); background: rgba(35, 12, 10, 0.85); }
      to { box-shadow: 0 25px 50px rgba(0,0,0,0.9), 0 0 85px rgba(240, 70, 50, 0.7); background: rgba(48, 8, 5, 0.9); }
    }
    .theme-inventory {
      border-color: rgba(96, 180, 200, 0.4);
      box-shadow: 0 25px 50px rgba(0,0,0,0.7), 0 0 35px rgba(96, 180, 200, 0.2);
      background: rgba(14, 22, 26, 0.8);
    }
    .hidden { display:none !important; }

    h1, h2 {
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    h2 {
      font-size: 1.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-row {
      display: flex;
      gap: 0.9rem;
      flex-wrap: wrap;
    }
    .stat {
      flex:1; min-width:80px;
      background: rgba(10,10,10,0.5);
      border:1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 0.7rem 0.5rem;
      text-align: center;
      backdrop-filter: blur(12px);
    }
    .stat-label {
      font-size:0.7rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-dim);
    }
    .stat-value {
      font-family: var(--font-mono);
      font-size: 1.8rem;
      font-weight: 600;
      line-height: 1.2;
    }
    .bar-horizontal {
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      margin: 6px 0 16px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #e6b34a, #c49a3c);
      border-radius: 10px;
      box-shadow: 0 0 12px var(--gold-glow);
      transition: width 0.6s var(--ease-smooth);
    }
    .log-panel {
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 1rem;
      height: 160px;
      overflow-y: auto;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: #c0b890;
      line-height: 1.5;
      backdrop-filter: blur(8px);
    }
    .choices-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .choice-btn {
      background: rgba(20,20,18,0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,200,0.08);
      border-radius: 20px;
      padding: 0.9rem 1.2rem;
      color: #ddd;
      font-size: 0.95rem;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: all 0.25s var(--ease-spring);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .choice-btn:hover {
      background: rgba(40,38,30,0.8);
      border-color: var(--border-active);
      transform: translateX(6px);
      box-shadow: 0 0 18px rgba(200,160,60,0.2);
    }
    .choice-btn:active { transform:scale(0.97); }
    .btn-special {
      background: linear-gradient(135deg, rgba(230,180,70,0.12), rgba(180,90,50,0.08));
      border-color: rgba(230,180,70,0.35);
    }
    .btn-disabled { opacity:0.4; pointer-events:none; }

    .mute-btn {
      position: absolute;
      top: 20px;
      right: 70px;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #aaa;
      z-index: 10;
    }
    .inv-btn {
      position: absolute;
      top: 20px;
      right: 24px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 6px 16px;
      color: #ccc;
      font-size: 0.85rem;
      cursor: pointer;
      z-index: 10;
    }
    .character-mood {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    @media (max-width:600px) {
      #game-container { padding:1.5rem; }
      h2 { font-size:1.4rem; }
    }
  </style>
</head>
<body>
<div id="game-container">
  <button class="mute-btn" id="muteToggle" title="Som">🔊</button>
  <button class="inv-btn" id="openInventoryBtn">🎒 Inventário</button>

  <!-- TELA INÍCIO -->
  <div id="screen-start">
    <h2>🌱 Projeto O₂: Ascensão</h2>
    <p style="color:var(--text-dim); margin-bottom:1rem;">Ano 2326. Superfície devastada. Você é um Ascensor.</p>
    <input type="text" id="nameInput" placeholder="Seu nome..." maxlength="20" style="width:100%; padding:12px; border-radius:20px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); color:white; margin-bottom:1rem;">
    <button class="choice-btn btn-special" id="startGameBtn" style="width:100%; justify-content:center;">Iniciar Jornada</button>
  </div>

  <!-- BUNKER -->
  <div id="screen-bunker" class="hidden">
    <h2>🏠 Bunker</h2>
    <div id="bunkerInfo"></div>
    <div class="bar-horizontal"><div class="bar-fill" id="vegBar"></div></div>
    <p style="font-size:0.9rem;">🌿 Vegetação: <span id="vegPercent">0%</span></p>
    <div class="choices-grid" id="bunkerActions"></div>
    <button class="choice-btn btn-special" id="goSurfaceBtn" style="width:100%; justify-content:center;">🌍 Ir para a Superfície</button>
  </div>

  <!-- SUPERFÍCIE -->
  <div id="screen-surface" class="hidden">
    <div class="character-mood" id="moodText"></div>
    <h2>🌫️ Superfície Tóxica</h2>
    <div class="status-row" id="surfaceStats"></div>
    <div class="log-panel" id="surfaceLog"></div>
    <div class="choices-grid" id="surfaceChoices"></div>
  </div>

  <!-- COMBATE -->
  <div id="screen-combat" class="hidden">
    <h2>⚔️ Confronto</h2>
    <div class="status-row" id="combatStats"></div>
    <p id="combatDesc" style="color:#e0b0a0;"></p>
    <div class="choices-grid" id="combatChoices"></div>
  </div>

  <!-- INVENTÁRIO -->
  <div id="screen-inventory" class="hidden">
    <h2 style="color:#9ad0e0;">🎒 Equipamento</h2>
    <div id="invContent"></div>
    <button class="choice-btn" id="closeInvBtn" style="width:100%; justify-content:center;">Fechar</button>
  </div>
</div>

<script>
  (function() {
    // ÁUDIO PROCEDURAL
    let audioCtx = null;
    let mute = false;
    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playTone(freq, type='sine', duration=0.15, vol=0.08) {
      if(mute || !audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type; osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + duration);
    }
    function ambientDrone() { /* poderia ser contínuo, simplificado */ }

    document.getElementById('muteToggle').addEventListener('click', ()=>{
      mute=!mute;
      document.getElementById('muteToggle').textContent = mute ? '🔇' : '🔊';
      if(!mute) initAudio();
    });

    // ESTADO
    const S = {
      name: '', hp:100, maxHp:100, energy:100, maxEnergy:100, hunger:0, maxHunger:100,
      coins:25, scrap:0, turn:1, maxTurns:10, vegetation:0,
      inventory: { food:3, medkit:1, sensor:0, grenade:0, seeds:0 },
      suitLvl:0, mutantWounded:false, mutantHp:0, mutantType:null,
      currentScreen:'start', previousScreen:null,
      ongoingEvent:null, eventTimer:0,
    };

    const container = document.getElementById('game-container');
    function setTheme(t) {
      container.className = '';
      if(t) container.classList.add('theme-'+t);
    }
    function showScreen(id, theme) {
      ['start','bunker','surface','combat','inventory'].forEach(s=>document.getElementById('screen-'+s).classList.add('hidden'));
      document.getElementById('screen-'+id).classList.remove('hidden');
      S.currentScreen = id;
      setTheme(theme||'');
    }

    // HELPERS
    const vegBar = document.getElementById('vegBar');
    const vegPercent = document.getElementById('vegPercent');
    function updateVegUI() { vegBar.style.width = S.vegetation+'%'; vegPercent.textContent = S.vegetation+'%'; }

    function surfaceStatsHTML() {
      return `
        <div class="stat"><div class="stat-label">❤️ Vida</div><div class="stat-value" style="color:#e05a4a;">${S.hp}/${S.maxHp}</div></div>
        <div class="stat"><div class="stat-label">⚡ Energia</div><div class="stat-value" style="color:#e6b34a;">${S.energy}/${S.maxEnergy}</div></div>
        <div class="stat"><div class="stat-label">🍖 Fome</div><div class="stat-value" style="color:#d9783c;">${S.hunger}/${S.maxHunger}</div></div>
        <div class="stat"><div class="stat-label">🕒 Turno</div><div class="stat-value">${S.turn}/${S.maxTurns}</div></div>
        <div class="stat"><div class="stat-label">💰 Sucata</div><div class="stat-value" style="color:#e6b34a;">${S.scrap}</div></div>
      `;
    }
    function combatStatsHTML() {
      return `
        <div class="stat"><div class="stat-label">❤️ Você</div><div class="stat-value" style="color:#e05a4a;">${S.hp}</div></div>
        <div class="stat"><div class="stat-label">👾 Mutante</div><div class="stat-value" style="color:#e05a4a;">${S.mutantHp}</div></div>
      `;
    }

    const logDiv = document.getElementById('surfaceLog');
    function addLog(msg, cls='') {
      const d = document.createElement('div'); d.textContent = msg;
      if(cls) d.style.color = cls==='danger'?'#e05a4a':cls==='success'?'#8bc78b':'#b0c0d0';
      logDiv.appendChild(d); logDiv.scrollTop = logDiv.scrollHeight;
    }
    function clearLog() { logDiv.innerHTML = ''; }
    function moodText() {
      let mood = '';
      if(S.hunger>70) mood = '☠️ Faminto e fraco.';
      else if(S.hp<30) mood = '🩸 Ferido. Cada passo dói.';
      else if(S.energy<25) mood = '💤 Exausto. Preciso descansar.';
      else if(S.scrap>20) mood = '💰 Carregado! Hora de voltar?';
      else mood = '🌫️ O ar pesa... mas sigo.';
      document.getElementById('moodText').textContent = mood;
    }

    function checkGameOver() {
      if(S.hp<=0) { S.hp=0; addLog('💀 Desmaio... resgatado.', 'danger'); loseExpedition(); return true; }
      if(S.energy<=0) { S.energy=0; addLog('😵 Exaustão total.', 'danger'); loseExpedition(); return true; }
      if(S.hunger>=S.maxHunger) { addLog('🤢 Desmaio de fome.', 'danger'); loseExpedition(); return true; }
      return false;
    }
    function loseExpedition() {
      S.scrap = 0; S.hp = Math.floor(S.maxHp*0.25); S.energy = Math.floor(S.maxEnergy*0.3);
      S.hunger = Math.min(S.maxHunger, S.hunger+20);
      returnToBunker();
    }

    function returnToBunker() {
      S.coins += S.scrap; S.scrap = 0;
      S.vegetation = Math.min(100, S.vegetation + 5);
      if(S.inventory.seeds>0) { S.vegetation = Math.min(100, S.vegetation + S.inventory.seeds*2); S.inventory.seeds=0; }
      updateVegUI();
      document.getElementById('bunkerInfo').innerHTML = `🔋 Vida ${S.hp}/${S.maxHp} · ⚡ ${S.energy} · 🍖 ${S.hunger} · 💰 ${S.coins} moedas`;
      renderBunkerShop();
      showScreen('bunker','bunker');
      if(S.vegetation>=100) victory();
    }

    function victory() {
      showScreen('bunker','bunker');
      document.getElementById('bunkerInfo').innerHTML = '<h2 style="color:#8bc78b;">🌍 VITÓRIA! A Terra respira novamente.</h2>';
    }

    function nextTurn() {
      if(checkGameOver()) return;
      S.turn++; S.hunger = Math.min(S.maxHunger, S.hunger+5);
      if(S.ongoingEvent) advanceEvent();
      if(S.turn > S.maxTurns) { addLog('⏳ Oxigênio esgotado. Retorno forçado.','danger'); S.hp-=5; returnToBunker(); return; }
      moodText();
      addLog(`Turno ${S.turn}/${S.maxTurns}`);
      generateSurfaceChoices();
    }

    // EVENTOS ENCADEADOS
    function startEvent(type) {
      S.ongoingEvent = type; S.eventTimer = 0;
    }
    function advanceEvent() {
      if(!S.ongoingEvent) return;
      S.eventTimer++;
      if(S.ongoingEvent==='storm') {
        if(S.eventTimer===1) addLog('🌪️ O céu escurece... tempestade tóxica se aproxima.');
        else if(S.eventTimer===2) {
          addLog('☠️ Chuva ácida! Precisa de abrigo ou sofrerá dano.','danger');
          // forçar escolha de abrigo na próxima rodada
        }
      }
    }

    const locations = [
      { name:'Mercado Abandonado', desc:'Prateleiras vazias, lixo.', loot:[3,8], danger:0.3 },
      { name:'Ruas Desertas', desc:'Asfalto rachado.', loot:[1,5], danger:0.15 },
      { name:'Campo de Lixo', desc:'Montanhas de detritos.', loot:[5,15], danger:0.4 },
      { name:'Esgoto', desc:'Úmido e escuro.', loot:[2,6], danger:0.25 },
      { name:'Prédios Antigos', desc:'Concreto desabado.', loot:[4,10], danger:0.35 },
      { name:'Metrô', desc:'Túneis silenciosos.', loot:[3,9], danger:0.3 }
    ];

    function generateSurfaceChoices() {
      const choicesDiv = document.getElementById('surfaceChoices');
      choicesDiv.innerHTML = '';
      const pool = ['comer','dormir','descansar','sucata','irlocal'];
      const shuffled = pool.sort(()=>Math.random()-0.5).slice(0,3);

      shuffled.forEach(action=>{
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        switch(action) {
          case 'comer':
            if(S.inventory.food<=0) { btn.classList.add('btn-disabled'); btn.textContent='🍞 Sem rações'; }
            else { btn.textContent='🍞 Comer ração (-fome, +energia)'; btn.onclick=()=>actionEat(); }
            break;
          case 'dormir':
            btn.textContent='💤 Dormir (recupera energia, reduz fome)'; btn.onclick=()=>actionSleep();
            break;
          case 'descansar':
            btn.textContent='🛌 Descansar (+energia)'; btn.onclick=()=>actionRest();
            break;
          case 'sucata':
            btn.textContent='🔍 Procurar Sucatas'; btn.onclick=()=>actionSearch();
            break;
          case 'irlocal':
            btn.textContent='🚶 Ir para local aleatório'; btn.onclick=()=>actionGoLocation();
            break;
        }
        choicesDiv.appendChild(btn);
      });
      if(S.turn>=7) {
        const retBtn = document.createElement('button');
        retBtn.className='choice-btn btn-special';
        retBtn.textContent='🏠 Voltar ao Bunker'; retBtn.onclick=()=>{ addLog('Retornando...'); returnToBunker(); };
        choicesDiv.appendChild(retBtn);
      }
    }

    function actionEat() {
      if(S.inventory.food<=0) return;
      S.inventory.food--; S.hunger = Math.max(0, S.hunger-40); S.energy = Math.min(S.maxEnergy, S.energy+20);
      addLog('🍞 Ração consumida.','success'); playTone(600,'sine',0.12,0.06);
      nextTurn();
    }
    function actionSleep() {
      let rec = Math.floor(Math.random()*16)+30; S.energy = Math.min(S.maxEnergy, S.energy+rec); S.hunger = Math.max(0, S.hunger-15);
      addLog(`💤 Dormiu. +${rec} energia.`); nextTurn();
    }
    function actionRest() {
      let rec = Math.floor(Math.random()*11)+20; S.energy = Math.min(S.maxEnergy, S.energy+rec);
      addLog(`🛌 Descansou. +${rec} energia.`); nextTurn();
    }
    function actionSearch() {
      S.energy-=12; S.hunger+=8; addLog('🔍 Vasculhando...');
      if(checkGameOver()) return;
      if(Math.random()<0.4) { addLog('⚠️ Mutante!','danger'); startCombat('random'); return; }
      let amount = Math.floor(Math.random()*5)+2; S.scrap+=amount;
      addLog(`Encontrou ${amount} sucatas.`,'success'); playTone(800,'triangle',0.1,0.05);
      nextTurn();
    }
    function actionGoLocation() {
      S.energy-=8; S.hunger+=5;
      if(checkGameOver()) return;
      let loc = locations[Math.floor(Math.random()*locations.length)];
      addLog(`📍 ${loc.name}: ${loc.desc}`);
      if(Math.random()<loc.danger) { addLog('Mutante no local!','danger'); startCombat(loc.name); return; }
      let amount = Math.floor(Math.random()*(loc.loot[1]-loc.loot[0]+1))+loc.loot[0];
      S.scrap+=amount; addLog(`Coletou ${amount} sucatas.`); nextTurn();
    }

    // COMBATE
    function startCombat(local) {
      S.mutantWounded = false;
      S.mutantHp = Math.floor(Math.random()*21)+30;
      S.mutantType = Math.random()<0.5 ? 'Rastejante' : 'Bruto';
      document.getElementById('combatDesc').textContent = `Um mutante ${S.mutantType} avança!`;
      document.getElementById('combatStats').innerHTML = combatStatsHTML();
      showScreen('combat','combat');
      renderCombatChoices();
      playTone(200,'sawtooth',0.2,0.1);
    }
    function renderCombatChoices() {
      const div = document.getElementById('combatChoices'); div.innerHTML = '';
      const atkBtn = document.createElement('button'); atkBtn.className='choice-btn';
      atkBtn.textContent='⚔️ Atacar (10-25 dano)'; atkBtn.onclick=()=>combatAction('attack'); div.appendChild(atkBtn);
      const defBtn = document.createElement('button'); defBtn.className='choice-btn';
      defBtn.textContent='🛡️ Defender'; defBtn.onclick=()=>combatAction('defend'); div.appendChild(defBtn);
      const fleeChance = S.mutantWounded ? 0.75 : 0.50;
      const fleeBtn = document.createElement('button'); fleeBtn.className='choice-btn';
      fleeBtn.textContent=`🏃 Fugir (${Math.round(fleeChance*100)}%)`; fleeBtn.onclick=()=>combatAction('flee'); div.appendChild(fleeBtn);
      if(S.inventory.grenade>0) {
        const grBtn = document.createElement('button'); grBtn.className='choice-btn btn-special';
        grBtn.textContent='💣 Granada (fuga certa)'; grBtn.onclick=()=>{ S.inventory.grenade--; addLog('Granada!'); endCombat(true); };
        div.appendChild(grBtn);
      }
    }
    function combatAction(type) {
      if(type==='attack') {
        if(Math.random()<0.3) addLog('Errou!','danger');
        else {
          let dmg = Math.floor(Math.random()*16)+10; S.mutantHp-=dmg; S.mutantWounded=true;
          addLog(`Acertou ${dmg} dano.`); if(S.mutantHp<=0) { addLog('Mutante abatido!'); S.scrap+=5; endCombat(true); return; }
        }
        let enemyDmg = Math.floor(Math.random()*11)+5; S.hp-=enemyDmg; addLog(`Mutante revida ${enemyDmg}.`,'danger');
      } else if(type==='defend') {
        let roll = Math.random(); let enemyDmg = Math.floor(Math.random()*11)+5;
        if(roll<0.7) addLog('Defesa total!'); else if(roll<0.9) { let d=Math.floor(enemyDmg/2); S.hp-=d; addLog(`Defesa parcial -${d}.`); }
        else { S.hp-=enemyDmg; addLog(`Falha -${enemyDmg}.`,'danger'); }
      } else if(type==='flee') {
        let chance = S.mutantWounded?0.75:0.50;
        if(Math.random()<chance) { addLog('Fugiu!'); S.energy-=10; endCombat(true); return; }
        else { let dmg=Math.floor(Math.random()*11)+5; S.hp-=dmg; addLog('Fuga falhou!','danger'); }
      }
      if(S.hp<=0) { S.hp=0; endCombat(false); return; }
      document.getElementById('combatStats').innerHTML = combatStatsHTML();
      renderCombatChoices();
    }
    function endCombat(survived) {
      showScreen('surface','surface');
      document.getElementById('surfaceStats').innerHTML = surfaceStatsHTML();
      if(!survived) loseExpedition();
      else { addLog('Confronto encerrado.'); nextTurn(); }
    }

    // BUNKER & LOJA
    function renderBunkerShop() {
      const div = document.getElementById('bunkerActions'); div.innerHTML = '';
      const items = [
        { name:'Ração', key:'food', cost:5 },
        { name:'Kit Médico', key:'medkit', cost:10 },
        { name:'Sensor', key:'sensor', cost:15 },
        { name:'Granada', key:'grenade', cost:20 },
        { name:'Sementes', key:'seeds', cost:30 },
        { name:'Upgrade Traje', key:'suit', cost:50 },
      ];
      items.forEach(it=>{
        const btn = document.createElement('button'); btn.className='choice-btn';
        btn.textContent = `${it.name} (${it.cost}💰)`;
        if(S.coins<it.cost) btn.classList.add('btn-disabled');
        btn.onclick = ()=>{
          if(S.coins>=it.cost) {
            S.coins-=it.cost;
            if(it.key==='suit') { S.suitLvl++; S.maxTurns = 10 + S.suitLvl*2; }
            else S.inventory[it.key]++;
            document.getElementById('bunkerInfo').innerHTML = `🔋 Vida ${S.hp}/${S.maxHp} · 💰 ${S.coins} moedas`;
            renderBunkerShop();
          }
        };
        div.appendChild(btn);
      });
    }

    // INVENTÁRIO
    function openInventory() {
      S.previousScreen = S.currentScreen;
      document.getElementById('invContent').innerHTML = `
        <p>💰 ${S.coins} moedas · 📦 Sucata na mão: ${S.scrap}</p>
        <p>🍞 Rações: ${S.inventory.food} · 💊 Kits: ${S.inventory.medkit} · 📡 Sensores: ${S.inventory.sensor}</p>
        <p>💣 Granadas: ${S.inventory.grenade} · 🌱 Sementes: ${S.inventory.seeds}</p>
        <p>🛡️ Traje nível ${S.suitLvl} (Turnos ${10+S.suitLvl*2})</p>
      `;
      showScreen('inventory','inventory');
    }

    // EVENTOS INICIAIS
    document.getElementById('startGameBtn').addEventListener('click', ()=>{
      initAudio();
      S.name = document.getElementById('nameInput').value.trim() || 'Ascensor';
      S.hp=100; S.energy=100; S.hunger=0; S.vegetation=0; S.coins=25; S.suitLvl=0; S.maxTurns=10;
      updateVegUI();
      document.getElementById('bunkerInfo').innerHTML = `Bem-vindo, <strong>${S.name}</strong>.`;
      renderBunkerShop();
      showScreen('bunker','bunker');
    });
    document.getElementById('goSurfaceBtn').addEventListener('click', ()=>{
      clearLog(); S.scrap=0; S.turn=1; S.ongoingEvent=null;
      document.getElementById('surfaceStats').innerHTML = surfaceStatsHTML();
      showScreen('surface','surface');
      addLog('Superfície. Ar pesado.');
      generateSurfaceChoices();
    });
    document.getElementById('openInventoryBtn').addEventListener('click', openInventory);
    document.getElementById('closeInvBtn').addEventListener('click', ()=>{
      showScreen(S.previousScreen || 'bunker', S.previousScreen==='surface'?'surface':'bunker');
    });
  })();
</script>
</body>
</html>
