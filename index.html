<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hollow: Devorar ou Ser Devorado</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #ccc;
      font-family: 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    #game {
      max-width: 550px;
      width: 100%;
      background: #1a1a1a;
      border: 2px solid #444;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 0 20px #00000088;
    }
    h2, h3 { color: #cc3333; }
    button {
      background: #2a2a2a;
      color: #ddd;
      border: 1px solid #555;
      padding: 8px 14px;
      margin: 4px;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #3a3a3a; border-color: #cc3333; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .bar-container {
      background: #222;
      border-radius: 4px;
      height: 20px;
      width: 100%;
      margin: 5px 0;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 100%;
      background: #cc3333;
      transition: width 0.2s;
    }
    .bar-fill.green { background: #33aa33; }
    .bar-fill.blue { background: #3377cc; }
    .log {
      background: #111;
      border: 1px solid #333;
      padding: 10px;
      margin: 15px 0;
      max-height: 200px;
      overflow-y: auto;
      font-size: 0.9em;
      color: #aaa;
    }
    .log p { margin: 3px 0; }
    .highlight { color: #ff8800; font-weight: bold; }
    .evolucao { color: #ffcc00; font-weight: bold; font-size: 1.2em; }
    #start-screen, #game-screen, #combat-screen { display: none; }
    #game-screen.active, #start-screen.active, #combat-screen.active { display: block; }
    #player-stats, #enemy-stats { margin: 10px 0; }
  </style>
</head>
<body>
<div id="game">
  <!-- Tela inicial -->
  <div id="start-screen" class="active">
    <h2>🌑 Hueco Mundo</h2>
    <p>Você é um Hollow faminto. Caçe, explore ruínas e devore para evoluir.</p>
    <input type="text" id="name-input" placeholder="Nome do Hollow" maxlength="12">
    <button id="start-btn">Iniciar Caçada</button>
  </div>

  <!-- Tela principal (overworld) -->
  <div id="game-screen">
    <div id="player-stats"></div>
    <button id="hunt-btn">🔪 Caçar Hollow</button>
    <button id="explore-btn">🔍 Explorar (20% chance carcaça)</button>
    <div class="log" id="log"></div>
  </div>

  <!-- Tela de combate -->
  <div id="combat-screen">
    <h3>⚔️ Combate</h3>
    <div id="enemy-stats"></div>
    <hr>
    <div id="player-stats-combat"></div>
    <div id="combat-actions"></div>
    <div class="log" id="combat-log"></div>
  </div>
</div>

<script>
  (function() {
    // -------------------- Efeitos das habilidades temáticas --------------------
    const ABILITY_EFFECTS = {
      // Hollow Comum
      "Prices": { dmgMult: 1.0, healPct: 0, bonusXp: 2 },      // ganha um pouco de XP extra ao acertar
      "Claws": { dmgMult: 1.2, healPct: 0 },                   // dano aumentado
      "Muscles": { dmgMult: 1.4, selfDmgPct: 0.05 },           // mais dano, mas se machuca levemente
      "Beast": { dmgMult: 1.1, ignoreDef: 0.5 },               // ignora metade da defesa
      // Menos Grande
      "Jaw": { dmgMult: 1.5, healPct: 0 },
      "Scratch": { dmgMult: 1.0, dotChance: 0.4, dotDmg: 3 },  // chance de causar sangramento (dano extra no turno seguinte)
      "Nerves": { dmgMult: 0.8, stunChance: 0.5 },             // chance de atordoar (inimigo perde próximo ataque)
      "Hungry": { dmgMult: 1.2, healFromDmg: 0.3 },            // cura 30% do dano causado
      // Adjucha
      "Language": { dmgMult: 1.3, ignoreDef: 0.7 },            // dano psíquico, ignora boa parte da defesa
      "Fingers": { dmgMult: 0.9, hits: 2 },                    // dois golpes (cada um com 90% do dano base)
      "Gluttony": { dmgMult: 1.1, healFromDmg: 0.5 },          // devora parte, cura metade do dano
      "Eyes closed": { dmgMult: 0.6, buffDef: 4, buffTurns: 1 }, // reduz dano mas aumenta defesa temporariamente
      // Vasto Lorde
      "Vision kingdoms": { dmgMult: 2.0, healPct: 0.1 },       // dano massivo, pequena autocura
      "Warlord": { dmgMult: 1.8, buffAtk: 5, buffTurns: 1 },   // dano alto e aumenta ataque no próximo turno
      "Vomit": { dmgMult: 1.5, poisonChance: 0.6, poisonDmg: 5 }, // chance de envenenar
      "Tyranny": { dmgMult: 2.5, selfDmgPct: 0.1 }             // dano extremo, mas perde 10% do HP atual
    };

    // -------------------- Configuração das formas --------------------
    const FORMS = {
      "Hollow Comum": { hp: 30, atk: 6, def: 2, xpNeeded: 20, abilities: ["Prices", "Claws", "Muscles", "Beast"] },
      "Menos Grande": { hp: 60, atk: 12, def: 5, xpNeeded: 60, abilities: ["Jaw", "Scratch", "Nerves", "Hungry"] },
      "Adjucha":      { hp: 40, atk: 18, def: 8, xpNeeded: 150, abilities: ["Language", "Fingers", "Gluttony", "Eyes closed"] },
      "Vasto Lorde":  { hp: 70, atk: 28, def: 14, xpNeeded: Infinity, abilities: ["Vision kingdoms", "Warlord", "Vomit", "Tyranny"] }
    };

    // -------------------- Classe Hollow --------------------
    class Hollow {
      constructor(name, form = "Hollow Comum", xp = 0, isEnemy = false) {
        this.name = name;
        this.form = form;
        this.xp = xp;
        this.isEnemy = isEnemy;
        const stats = FORMS[form];
        this.maxHp = stats.hp;
        this.hp = this.maxHp;
        this.atk = stats.atk;
        this.def = stats.def;
        this.xpNeeded = stats.xpNeeded;
        this.abilities = [...stats.abilities];
        // Efeitos temporários
        this.bonusDef = 0;
        this.bonusAtk = 0;
        this.stunned = false;
        this.poison = 0; // dano por veneno no próximo turno
        this.dot = 0;    // sangramento
      }

      isAlive() { return this.hp > 0; }

      applyTempEffects() {
        if (this.poison > 0) {
          this.hp -= this.poison;
          this.poison = 0;
        }
        if (this.dot > 0) {
          this.hp -= this.dot;
          this.dot = 0;
        }
        if (this.hp < 0) this.hp = 0;
        if (this.bonusDef > 0) this.bonusDef = 0; // dura 1 turno
        if (this.bonusAtk > 0) this.bonusAtk = 0;
      }

      getEffectiveAtk() { return this.atk + this.bonusAtk; }
      getEffectiveDef() { return this.def + this.bonusDef; }

      attack(target, ability = "Claws") {
        const effect = ABILITY_EFFECTS[ability] || { dmgMult: 1.0 };
        let baseDmg = this.getEffectiveAtk() - target.getEffectiveDef();
        if (baseDmg < 1) baseDmg = 1;
        if (effect.ignoreDef) {
          baseDmg = this.getEffectiveAtk() - Math.floor(target.def * (1 - effect.ignoreDef));
          if (baseDmg < 1) baseDmg = 1;
        }
        let dmg = Math.floor(baseDmg * (effect.dmgMult || 1.0));
        let msg = `${this.name} usou ${ability}. `;

        // Múltiplos golpes (ex: Fingers)
        if (effect.hits) {
          dmg = 0;
          for (let i = 0; i < effect.hits; i++) {
            let hitDmg = Math.floor(baseDmg * (effect.dmgMult || 1.0));
            dmg += hitDmg;
          }
          msg += `${effect.hits} golpes! `;
        }

        // Autodano (Muscles, Tyranny)
        if (effect.selfDmgPct) {
          const selfDmg = Math.floor(this.hp * effect.selfDmgPct);
          this.hp = Math.max(0, this.hp - selfDmg);
          msg += `Você se feriu e perdeu ${selfDmg} HP. `;
        }

        // Cura baseada em percentual do HP máximo (Prices? não, Prices tem bonusXp)
        if (effect.healPct) {
          const heal = Math.floor(this.maxHp * effect.healPct);
          this.hp = Math.min(this.maxHp, this.hp + heal);
          msg += `Você se curou em ${heal} HP. `;
        }

        // Cura baseada no dano causado (Hungry, Gluttony)
        if (effect.healFromDmg) {
          const heal = Math.floor(dmg * effect.healFromDmg);
          this.hp = Math.min(this.maxHp, this.hp + heal);
          msg += `Você drenou ${heal} HP. `;
        }

        // Bônus de XP (Prices)
        if (effect.bonusXp) {
          this.xp += effect.bonusXp;
          msg += `(+${effect.bonusXp} XP extra) `;
        }

        // Buff de defesa (Eyes closed)
        if (effect.buffDef) {
          this.bonusDef = effect.buffDef;
          msg += `Sua defesa aumentou em ${effect.buffDef} por 1 turno. `;
        }

        // Buff de ataque (Warlord)
        if (effect.buffAtk) {
          this.bonusAtk = effect.buffAtk;
          msg += `Seu ataque aumentou em ${effect.buffAtk} por 1 turno. `;
        }

        // Aplicar dano ao alvo
        target.hp -= dmg;
        msg += `Causou ${dmg} de dano.`;

        // Efeitos no alvo: stun (Nerves)
        if (effect.stunChance && Math.random() < effect.stunChance) {
          target.stunned = true;
          msg += ` ${target.name} está atordoado!`;
        }
        // Veneno (Vomit)
        if (effect.poisonChance && Math.random() < effect.poisonChance) {
          target.poison = effect.poisonDmg;
          msg += ` ${target.name} foi envenenado!`;
        }
        // Sangramento (Scratch)
        if (effect.dotChance && Math.random() < effect.dotChance) {
          target.dot = effect.dotDmg;
          msg += ` ${target.name} está sangrando!`;
        }

        return { dmg, msg };
      }

      eat(prey) {
        const gain = prey.xp + Math.floor(Math.random() * 15) + 5;
        this.xp += gain;
        const msg = `Você devorou ${prey.name} e ganhou ${gain} de XP. (Total: ${this.xp}/${this.xpNeeded})`;
        this.checkEvolution();
        return msg;
      }

      checkEvolution() {
        if (this.form === "Hollow Comum" && this.xp >= 20) {
          this.evolve("Menos Grande");
        } else if (this.form === "Menos Grande" && this.xp >= 60) {
          this.evolve("Adjucha");
        } else if (this.form === "Adjucha" && this.xp >= 150) {
          this.evolve("Vasto Lorde");
        }
      }

      evolve(newForm) {
        this.form = newForm;
        const s = FORMS[newForm];
        this.maxHp = s.hp;
        this.hp = this.maxHp;
        this.atk = s.atk;
        this.def = s.def;
        this.xpNeeded = s.xpNeeded;
        this.abilities = [...s.abilities];
        // Limpar efeitos
        this.bonusDef = 0;
        this.bonusAtk = 0;
        this.stunned = false;
        this.poison = 0;
        this.dot = 0;
        addLog(`🌟 EVOLUÇÃO! Agora você é um ${newForm}!`, 'evolucao');
      }
    }

    // -------------------- Geração de inimigos --------------------
    function generateEnemy(playerLevel) {
      let form;
      if (playerLevel === 0) form = Math.random() < 0.85 ? "Hollow Comum" : "Menos Grande";
      else if (playerLevel === 1) form = Math.random() < 0.6 ? "Menos Grande" : "Adjucha";
      else if (playerLevel === 2) form = Math.random() < 0.7 ? "Adjucha" : "Vasto Lorde";
      else form = "Vasto Lorde";
      const names = ["Rastejante", "Uivador", "Devorador", "Sombra Cruel", "Mandíbula", "Garranegra", "Olho Oco"];
      const name = names[Math.floor(Math.random() * names.length)];
      const xp = Math.floor(Math.random() * 25) + 5;
      return new Hollow(name, form, xp, true);
    }

    // -------------------- Estado do jogo --------------------
    let player = null;
    let currentEnemy = null;
    const startScreen = document.getElementById('start-screen');
    const gameScreen = document.getElementById('game-screen');
    const combatScreen = document.getElementById('combat-screen');
    const logDiv = document.getElementById('log');
    const combatLogDiv = document.getElementById('combat-log');

    function addLog(msg, cls = '') {
      const p = document.createElement('p');
      if (cls) p.className = cls;
      p.textContent = msg;
      logDiv.appendChild(p);
      combatLogDiv.appendChild(p.cloneNode(true));
      logDiv.scrollTop = logDiv.scrollHeight;
      combatLogDiv.scrollTop = combatLogDiv.scrollHeight;
    }

    function clearLogs() {
      logDiv.innerHTML = '';
      combatLogDiv.innerHTML = '';
    }

    function showScreen(screen) {
      startScreen.classList.remove('active');
      gameScreen.classList.remove('active');
      combatScreen.classList.remove('active');
      screen.classList.add('active');
    }

    function updatePlayerStats(containerId = 'player-stats') {
      const container = document.getElementById(containerId);
      container.innerHTML = `
        <strong>${player.name}</strong> [${player.form}]<br>
        HP: ${player.hp}/${player.maxHp} 
        <div class="bar-container"><div class="bar-fill green" style="width:${(player.hp/player.maxHp)*100}%"></div></div>
        ATK: ${player.getEffectiveAtk()} | DEF: ${player.getEffectiveDef()} | XP: ${player.xp}/${player.xpNeeded}
        <br>Habilidades: ${player.abilities.join(', ')}
        ${player.bonusAtk ? ' <span style="color:#ffaa00;">(Atk+)</span>' : ''}
        ${player.bonusDef ? ' <span style="color:#aaaaff;">(Def+)</span>' : ''}
      `;
    }

    function updateEnemyStats() {
      const container = document.getElementById('enemy-stats');
      container.innerHTML = `
        <strong>${currentEnemy.name}</strong> [${currentEnemy.form}]<br>
        HP: ${currentEnemy.hp}/${currentEnemy.maxHp}
        <div class="bar-container"><div class="bar-fill" style="width:${(currentEnemy.hp/currentEnemy.maxHp)*100}%"></div></div>
        ${currentEnemy.stunned ? ' <span style="color:yellow;">(Atordoado)</span>' : ''}
        ${currentEnemy.poison ? ' <span style="color:green;">(Envenenado)</span>' : ''}
        ${currentEnemy.dot ? ' <span style="color:red;">(Sangrando)</span>' : ''}
      `;
    }

    function setupCombatActions() {
      const actionsDiv = document.getElementById('combat-actions');
      actionsDiv.innerHTML = '';
      player.abilities.forEach(ab => {
        const btn = document.createElement('button');
        btn.textContent = ab;
        btn.addEventListener('click', () => playerTurn(ab));
        actionsDiv.appendChild(btn);
      });
    }

    function startCombat(enemy) {
      currentEnemy = enemy;
      showScreen(combatScreen);
      updatePlayerStats('player-stats-combat');
      updateEnemyStats();
      setupCombatActions();
      combatLogDiv.innerHTML = `<p>Você encontrou ${enemy.name} (${enemy.form})!</p>`;
    }

    function endCombat(victory) {
      if (victory) {
        const msg = player.eat(currentEnemy);
        addLog(msg);
        if (player.form === "Vasto Lorde") {
          addLog("🌟 Você se tornou um Vasto Lorde! O ápice da existência Hollow. 🌟");
          alert("Parabéns! Você alcançou o topo da cadeia alimentar! Atualize a página para jogar novamente.");
          document.getElementById('hunt-btn').disabled = true;
          document.getElementById('explore-btn').disabled = true;
        }
        showScreen(gameScreen);
        updatePlayerStats();
      } else {
        addLog("☠️ Você foi destruído. Sua jornada termina aqui.");
        alert("Game Over! Atualize a página para tentar novamente.");
        document.getElementById('hunt-btn').disabled = true;
        document.getElementById('explore-btn').disabled = true;
        showScreen(gameScreen);
      }
    }

    function playerTurn(ability) {
      if (!currentEnemy || !player.isAlive()) return;

      // Aplica efeitos temporários do turno anterior (veneno, sangramento, stun do inimigo)
      currentEnemy.applyTempEffects();
      if (!currentEnemy.isAlive()) {
        addLog(`${currentEnemy.name} sucumbiu aos efeitos!`);
        endCombat(true);
        return;
      }

      const result = player.attack(currentEnemy, ability);
      addLog(result.msg, 'highlight');
      updateEnemyStats();
      updatePlayerStats('player-stats-combat');

      if (!currentEnemy.isAlive()) {
        addLog(`${currentEnemy.name} foi derrotado!`);
        endCombat(true);
        return;
      }

      // Turno do inimigo (se não estiver atordoado)
      if (!currentEnemy.stunned) {
        currentEnemy.applyTempEffects();
        if (!currentEnemy.isAlive()) {
          addLog(`${currentEnemy.name} morreu devido aos ferimentos.`);
          endCombat(true);
          return;
        }
        const enemyAb = currentEnemy.abilities[Math.floor(Math.random() * currentEnemy.abilities.length)];
        const enemyResult = currentEnemy.attack(player, enemyAb);
        addLog(enemyResult.msg);
        player.applyTempEffects();
        updatePlayerStats('player-stats-combat');
        updateEnemyStats();

        if (!player.isAlive()) {
          addLog("Você caiu em combate...");
          endCombat(false);
          return;
        }
      } else {
        addLog(`${currentEnemy.name} está atordoado e não pode agir!`);
        currentEnemy.stunned = false; // stun passa após perder o turno
      }

      // Ao final do turno do jogador, também aplicamos efeitos nele (caso tenha veneno/sangramento aplicado pelo inimigo)
      player.applyTempEffects();
      if (!player.isAlive()) {
        addLog("Você morreu devido aos ferimentos.");
        endCombat(false);
      }
      updatePlayerStats('player-stats-combat');
    }

    function explore() {
      if (Math.random() < 0.2) {
        const xpGain = Math.floor(Math.random() * 20) + 10;
        const heal = Math.floor(player.maxHp * 0.25);
        player.xp += xpGain;
        player.hp = Math.min(player.maxHp, player.hp + heal);
        addLog(`🔍 Você encontrou uma carcaça! Devorou os restos e ganhou ${xpGain} XP e curou ${heal} HP.`);
        player.checkEvolution();
        updatePlayerStats();
      } else {
        addLog("🔍 Você explorou as areias brancas, mas não encontrou nada.");
      }
    }

    function hunt() {
      const levelMap = { "Hollow Comum": 0, "Menos Grande": 1, "Adjucha": 2, "Vasto Lorde": 3 };
      const level = levelMap[player.form];
      const enemy = generateEnemy(level);
      startCombat(enemy);
    }

    // -------------------- Inicialização --------------------
    document.getElementById('start-btn').addEventListener('click', () => {
      const name = document.getElementById('name-input').value.trim();
      if (!name) {
        alert("Escolha um nome para o seu Hollow.");
        return;
      }
      player = new Hollow(name);
      clearLogs();
      updatePlayerStats();
      document.getElementById('hunt-btn').disabled = false;
      document.getElementById('explore-btn').disabled = false;
      addLog(`Bem-vindo, ${name}. Que comece a caçada.`);
      showScreen(gameScreen);
    });

    document.getElementById('hunt-btn').addEventListener('click', hunt);
    document.getElementById('explore-btn').addEventListener('click', explore);

    // Iniciar na tela de nome
    showScreen(startScreen);
  })();
</script>
</body>
</html>
