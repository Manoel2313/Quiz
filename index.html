<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hollow: Devorar ou Ser Devorado</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #ccc;
      font-family: 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    #game {
      max-width: 550px;
      width: 100%;
      background: #1a1a1a;
      border: 2px solid #444;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 0 20px #00000088;
    }
    h2, h3 { color: #cc3333; }
    button {
      background: #2a2a2a;
      color: #ddd;
      border: 1px solid #555;
      padding: 8px 14px;
      margin: 4px;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #3a3a3a; border-color: #cc3333; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .bar-container {
      background: #222;
      border-radius: 4px;
      height: 20px;
      width: 100%;
      margin: 5px 0;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 100%;
      background: #cc3333;
      transition: width 0.2s;
    }
    .bar-fill.green { background: #33aa33; }
    .bar-fill.blue { background: #3377cc; }
    .log {
      background: #111;
      border: 1px solid #333;
      padding: 10px;
      margin: 15px 0;
      max-height: 200px;
      overflow-y: auto;
      font-size: 0.9em;
      color: #aaa;
    }
    .log p { margin: 3px 0; }
    .highlight { color: #ff8800; font-weight: bold; }
    .evolucao { color: #ffcc00; font-weight: bold; font-size: 1.2em; }
    #start-screen, #game-screen, #combat-screen { display: none; }
    #game-screen.active, #start-screen.active, #combat-screen.active { display: block; }
    #player-stats, #enemy-stats { margin: 10px 0; }
  </style>
</head>
<body>
<div id="game">
  <!-- Tela inicial -->
  <div id="start-screen" class="active">
    <h2>🌑 Hueco Mundo</h2>
    <p>Você é um Hollow faminto. Caçe, devore e evolua.</p>
    <input type="text" id="name-input" placeholder="Nome do Hollow" maxlength="12">
    <button id="start-btn">Iniciar Caçada</button>
  </div>

  <!-- Tela principal (overworld) -->
  <div id="game-screen">
    <div id="player-stats"></div>
    <button id="hunt-btn">🔪 Caçar Hollow</button>
    <button id="rest-btn">💤 Descansar (cura 40%)</button>
    <div class="log" id="log"></div>
  </div>

  <!-- Tela de combate -->
  <div id="combat-screen">
    <h3>⚔️ Combate</h3>
    <div id="enemy-stats"></div>
    <hr>
    <div id="player-stats-combat"></div>
    <div id="combat-actions"></div>
    <div class="log" id="combat-log"></div>
  </div>
</div>

<script>
  (function() {
    // -------------------- Configuração das formas --------------------
    const FORMS = {
      "Hollow Comum": { hp: 30, atk: 6, def: 2, xpNeeded: 20, abilities: ["Garra", "Mordida"] },
      "Menos Grande": { hp: 60, atk: 12, def: 5, xpNeeded: 60, abilities: ["Garra", "Mordida", "Cero Bruto"] },
      "Adjucha":      { hp: 40, atk: 18, def: 8, xpNeeded: 150, abilities: ["Garra", "Mordida", "Cero Rápido", "Regeneração"] },
      "Vasto Lorde":  { hp: 70, atk: 28, def: 14, xpNeeded: Infinity, abilities: ["Garra", "Mordida", "Gran Rey Cero", "Hierro", "Sonido"] }
    };

    // -------------------- Classe Hollow --------------------
    class Hollow {
      constructor(name, form = "Hollow Comum", xp = 0, isEnemy = false) {
        this.name = name;
        this.form = form;
        this.xp = xp;
        this.isEnemy = isEnemy;
        const stats = FORMS[form];
        this.maxHp = stats.hp;
        this.hp = this.maxHp;
        this.atk = stats.atk;
        this.def = stats.def;
        this.xpNeeded = stats.xpNeeded;
        this.abilities = [...stats.abilities];
      }

      isAlive() { return this.hp > 0; }

      attack(target, ability = "Garra") {
        let baseDmg = this.atk - target.def;
        if (baseDmg < 1) baseDmg = 1;
        let dmg = baseDmg;
        if (ability.includes("Cero")) dmg = Math.floor(baseDmg * 1.6);
        if (ability === "Gran Rey Cero") dmg = Math.floor(baseDmg * 2.2);
        if (ability === "Regeneração") {
          const heal = Math.floor(this.maxHp * 0.2);
          this.hp = Math.min(this.maxHp, this.hp + heal);
          return { dmg: 0, msg: `${this.name} usou Regeneração e recuperou ${heal} de HP.` };
        }
        target.hp -= dmg;
        return { dmg, msg: `${this.name} atacou com ${ability} e causou ${dmg} de dano.` };
      }

      eat(prey) {
        const gain = prey.xp + Math.floor(Math.random() * 15) + 5;
        this.xp += gain;
        const msg = `Você devorou ${prey.name} e ganhou ${gain} de XP. (Total: ${this.xp}/${this.xpNeeded})`;
        this.checkEvolution();
        return msg;
      }

      checkEvolution() {
        if (this.form === "Hollow Comum" && this.xp >= 20) {
          this.evolve("Menos Grande");
        } else if (this.form === "Menos Grande" && this.xp >= 60) {
          this.evolve("Adjucha");
        } else if (this.form === "Adjucha" && this.xp >= 150) {
          this.evolve("Vasto Lorde");
        }
      }

      evolve(newForm) {
        this.form = newForm;
        const s = FORMS[newForm];
        this.maxHp = s.hp;
        this.hp = this.maxHp;
        this.atk = s.atk;
        this.def = s.def;
        this.xpNeeded = s.xpNeeded;
        this.abilities = [...s.abilities];
        addLog(`🌟 EVOLUÇÃO! Agora você é um ${newForm}!`, 'evolucao');
      }
    }

    // -------------------- Geração de inimigos --------------------
    function generateEnemy(playerLevel) {
      let form;
      if (playerLevel === 0) form = Math.random() < 0.85 ? "Hollow Comum" : "Menos Grande";
      else if (playerLevel === 1) form = Math.random() < 0.6 ? "Menos Grande" : "Adjucha";
      else if (playerLevel === 2) form = Math.random() < 0.7 ? "Adjucha" : "Vasto Lorde";
      else form = "Vasto Lorde";
      const names = ["Rastejante", "Uivador", "Devorador", "Sombra Cruel", "Mandíbula", "Garranegra", "Olho Oco"];
      const name = names[Math.floor(Math.random() * names.length)];
      const xp = Math.floor(Math.random() * 25) + 5;
      return new Hollow(name, form, xp, true);
    }

    // -------------------- Estado do jogo --------------------
    let player = null;
    let currentEnemy = null;
    const startScreen = document.getElementById('start-screen');
    const gameScreen = document.getElementById('game-screen');
    const combatScreen = document.getElementById('combat-screen');
    const logDiv = document.getElementById('log');
    const combatLogDiv = document.getElementById('combat-log');

    function addLog(msg, cls = '') {
      const p = document.createElement('p');
      if (cls) p.className = cls;
      p.textContent = msg;
      logDiv.appendChild(p);
      combatLogDiv.appendChild(p.cloneNode(true));
      logDiv.scrollTop = logDiv.scrollHeight;
      combatLogDiv.scrollTop = combatLogDiv.scrollHeight;
    }

    function clearLogs() {
      logDiv.innerHTML = '';
      combatLogDiv.innerHTML = '';
    }

    function showScreen(screen) {
      startScreen.classList.remove('active');
      gameScreen.classList.remove('active');
      combatScreen.classList.remove('active');
      screen.classList.add('active');
    }

    function updatePlayerStats(containerId = 'player-stats') {
      const container = document.getElementById(containerId);
      container.innerHTML = `
        <strong>${player.name}</strong> [${player.form}]<br>
        HP: ${player.hp}/${player.maxHp} 
        <div class="bar-container"><div class="bar-fill green" style="width:${(player.hp/player.maxHp)*100}%"></div></div>
        ATK: ${player.atk} | DEF: ${player.def} | XP: ${player.xp}/${player.xpNeeded}
        <br>Habilidades: ${player.abilities.join(', ')}
      `;
    }

    function updateEnemyStats() {
      const container = document.getElementById('enemy-stats');
      container.innerHTML = `
        <strong>${currentEnemy.name}</strong> [${currentEnemy.form}]<br>
        HP: ${currentEnemy.hp}/${currentEnemy.maxHp}
        <div class="bar-container"><div class="bar-fill" style="width:${(currentEnemy.hp/currentEnemy.maxHp)*100}%"></div></div>
      `;
    }

    function setupCombatActions() {
      const actionsDiv = document.getElementById('combat-actions');
      actionsDiv.innerHTML = '';
      player.abilities.forEach(ab => {
        const btn = document.createElement('button');
        btn.textContent = ab;
        btn.addEventListener('click', () => playerTurn(ab));
        actionsDiv.appendChild(btn);
      });
    }

    function startCombat(enemy) {
      currentEnemy = enemy;
      showScreen(combatScreen);
      updatePlayerStats('player-stats-combat');
      updateEnemyStats();
      setupCombatActions();
      combatLogDiv.innerHTML = `<p>Você encontrou ${enemy.name} (${enemy.form})!</p>`;
    }

    function endCombat(victory) {
      if (victory) {
        const msg = player.eat(currentEnemy);
        addLog(msg);
        if (player.form === "Vasto Lorde") {
          addLog("🌟 Você se tornou um Vasto Lorde! O ápice da existência Hollow. 🌟");
          alert("Parabéns! Você alcançou o topo da cadeia alimentar! Atualize a página para jogar novamente.");
          document.getElementById('hunt-btn').disabled = true;
          document.getElementById('rest-btn').disabled = true;
        }
        showScreen(gameScreen);
        updatePlayerStats();
      } else {
        addLog("☠️ Você foi destruído. Sua jornada termina aqui.");
        alert("Game Over! Atualize a página para tentar novamente.");
        document.getElementById('hunt-btn').disabled = true;
        document.getElementById('rest-btn').disabled = true;
        showScreen(gameScreen);
      }
    }

    function playerTurn(ability) {
      if (!currentEnemy || !player.isAlive()) return;
      const result = player.attack(currentEnemy, ability);
      addLog(result.msg, 'highlight');
      updateEnemyStats();
      updatePlayerStats('player-stats-combat');

      if (!currentEnemy.isAlive()) {
        addLog(`${currentEnemy.name} foi derrotado!`);
        endCombat(true);
        return;
      }

      // Inimigo contra-ataca
      const enemyAb = currentEnemy.abilities[Math.floor(Math.random() * currentEnemy.abilities.length)];
      const enemyResult = currentEnemy.attack(player, enemyAb);
      addLog(enemyResult.msg);
      updatePlayerStats('player-stats-combat');
      updateEnemyStats();

      if (!player.isAlive()) {
        addLog("Você caiu em combate...");
        endCombat(false);
      }
    }

    function rest() {
      const heal = Math.floor(player.maxHp * 0.4);
      player.hp = Math.min(player.maxHp, player.hp + heal);
      addLog(`Você descansou e recuperou ${heal} de HP.`);
      updatePlayerStats();
    }

    function hunt() {
      const levelMap = { "Hollow Comum": 0, "Menos Grande": 1, "Adjucha": 2, "Vasto Lorde": 3 };
      const level = levelMap[player.form];
      const enemy = generateEnemy(level);
      startCombat(enemy);
    }

    // -------------------- Inicialização --------------------
    document.getElementById('start-btn').addEventListener('click', () => {
      const name = document.getElementById('name-input').value.trim();
      if (!name) {
        alert("Escolha um nome para o seu Hollow.");
        return;
      }
      player = new Hollow(name);
      clearLogs();
      updatePlayerStats();
      document.getElementById('hunt-btn').disabled = false;
      document.getElementById('rest-btn').disabled = false;
      addLog(`Bem-vindo, ${name}. Que comece a caçada.`);
      showScreen(gameScreen);
    });

    document.getElementById('hunt-btn').addEventListener('click', hunt);
    document.getElementById('rest-btn').addEventListener('click', rest);

    // Iniciar na tela de nome
    showScreen(startScreen);
  })();
</script>
</body>
</html>
